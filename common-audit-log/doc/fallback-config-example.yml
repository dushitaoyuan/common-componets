# ==================== 监控命令参考 ====================

# 查看降级目录状态
# ls -lh ./data/audit-fallback/

# 查看当前正在写入的文件
# tail -f ./data/audit-fallback/audit_current.log

# 查看已滚动的文件
# ls -lh ./data/audit-fallback/audit_*.log

# 查看索引状态
# cat ./data/audit-fallback/.compensation_index

# 统计未补偿文件数量
# ls ./data/audit-fallback/audit_*.log | wc -l

# 清理已补偿的文件（谨慎操作）
# rm ./data/audit-fallback/audit_20260417_*.log
