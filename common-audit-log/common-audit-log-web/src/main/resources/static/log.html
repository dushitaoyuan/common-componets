<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计日志查询</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- json对比 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/css/diff2html.min.css">
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/js/diff2html-ui.min.js"></script>
    <script src="./js/json-compare.js"></script>

    <!-- laydate 日期时间选择控件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.6/dist/css/layui.css">
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.6/dist/layui.js"></script>

    <!-- json格式化 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-jsonview@1.2.3/dist/jquery.jsonview.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-jsonview@1.2.3/dist/jquery.jsonview.min.js"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --info-color: #3b82f6;
            --dark-color: #1e293b;
            --light-color: #f1f5f9;
            --border-color: #e2e8f0;
            --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.06);
            --hover-shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.06);
            --background-color: #f8fafc;
            --card-bg-color: #ffffff;
            --header-bg-color: #f1f5f9;
            --modal-bg: #ffffff;
            --modal-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--dark-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header h1 {
            color: var(--dark-color);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg-color);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
        }

        .card-header {
            background: var(--header-bg-color);
            color: var(--dark-color);
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .card-header:hover {
            background: #e2e8f0;
        }

        .card-body {
            padding: 20px;
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #334155;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #ffffff;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* 时间输入框加宽样式 */
        .time-input {
            grid-column: span 2;
        }

        .time-input input {
            min-width: 280px;
            font-size: 0.95rem;
            padding: 8px 12px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 快捷时间选择 */
        .quick-time-group {
            grid-column: span 2;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--light-color);
            color: var(--dark-color);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .btn-info {
            background: var(--info-color);
            color: white;
        }

        .btn-info:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 800px;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--header-bg-color);
            font-weight: 600;
            color: #334155;
            position: sticky;
            top: 0;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f8fafc;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .status-fail {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .no-data i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .no-data p {
            font-size: 1.2rem;
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding: 15px 0;
            border-top: 1px solid var(--border-color);
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .page-sizes {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* layui 分页组件样式调整 */
        #layuiPagination {
            display: flex;
            align-items: center;
        }

        #layuiPagination .layui-box a,
        #layuiPagination .layui-box span {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin: 0 5px;
            padding: 8px 12px;
            color: var(--dark-color);
            background: var(--card-bg-color);
            transition: all 0.2s;
        }

        #layuiPagination .layui-box a:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #layuiPagination .layui-box .layui-laypage-curr {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #layuiPagination .layui-box .layui-laypage-curr em {
            color: white;
        }

        #layuiPagination .layui-box select {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px 10px;
            background: var(--card-bg-color);
        }

        /* layui 日期时间控件样式修复 */
        .layui-laydate {
            max-width: 100vw !important;
            overflow: hidden !important;
            min-width: 400px !important;
            min-height: 350px !important;
        }

        .layui-laydate-main {
            max-width: 100vw !important;
            overflow: visible !important;
            width: 100% !important;
        }

        .layui-laydate-content {
            overflow-x: auto !important;
            overflow-y: visible !important;
            width: 100% !important;
        }

        .layui-laydate-header,
        .layui-laydate-list {
            width: 100% !important;
            overflow: visible !important;
        }

        .layui-laydate .layui-laydate-main .layui-laydate-content table {
            width: 100% !important;
            table-layout: auto !important;
            min-width: 350px !important;
        }

        .layui-laydate .layui-laydate-main .layui-laydate-content table th,
        .layui-laydate .layui-laydate-main .layui-laydate-content table td {
            width: 40px !important;
            min-width: 40px !important;
            height: 38px !important;
            padding: 8px !important;
            font-size: 14px !important;
        }

        .layui-laydate .layui-laydate-main .layui-laydate-content td {
            cursor: pointer;
        }

        /* 日期选择器底部按钮区域 */
        .layui-laydate-footer {
            width: 100% !important;
            padding: 10px !important;
        }

        /* 时间选择面板 */
        .layui-laydate-time {
            width: 100% !important;
        }

        /* 防止日期控件溢出容器 */
        .card-body {
            overflow-x: hidden;
        }

        /* 确保 layui 日期选择器在最上层显示 */
        .layui-laydate,
        .layui-laydate-shade {
            z-index: 999999 !important;
        }

        .page-sizes select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--card-bg-color);
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            border-top: 4px solid var(--primary-color);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .collapse-icon {
            transition: transform 0.3s ease;
        }

        .collapse-icon.rotated {
            transform: rotate(180deg);
        }

        .search-content {
            transition: all 0.3s ease;
        }

        .search-content.collapsed {
            display: none;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--modal-bg);
            border-radius: 12px;
            box-shadow: var(--modal-shadow);
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--header-bg-color);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .modal-close:hover {
            color: var(--dark-color);
        }

        .modal-body {
            padding: 20px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .detail-table th,
        .detail-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-table th {
            background-color: var(--header-bg-color);
            font-weight: 600;
            width: 30%;
        }

        .json-container {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .diff-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .diff-column {
            flex: 1;
        }

        .diff-column h4 {
            margin-top: 0;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .diff-content {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .search-form {
                grid-template-columns: 1fr;
            }

            .time-input {
                grid-column: span 1;
            }

            .time-input input {
                min-width: 260px;
                width: 100%;
                font-size: 0.9rem;
            }

            .btn-group {
                flex-direction: column;
            }

            .pagination-container {
                flex-direction: column;
                gap: 20px;
            }

            .diff-container {
                flex-direction: column;
            }
        }


    </style>

</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-clipboard-list"></i> 审计日志查询</h1>
    </div>

    <div class="card">
        <div class="card-header" id="searchHeader">
            <div>
                <i class="fas fa-search"></i> 查询条件
            </div>
            <i class="fas fa-chevron-down collapse-icon" id="collapseIcon"></i>
        </div>
        <div class="card-body search-content" id="searchContent">
            <div class="search-form">
                <div class="form-group">
                    <label for="bizType"><i class="fas fa-tags"></i> 业务类型</label>
                    <input type="text" id="bizType" placeholder="业务类型">
                </div>
                <div class="form-group">
                    <label for="subType"><i class="fas fa-cogs"></i> 业务子类型</label>
                    <input type="text" id="subType" placeholder="业务子类型">
                </div>
                <div class="form-group">
                    <label for="operator"><i class="fas fa-user"></i> 操作人</label>
                    <input type="text" id="operator" placeholder="操作人">
                </div>
                <div class="form-group">
                    <label for="tenant"><i class="fas fa-building"></i> 租户</label>
                    <input type="text" id="tenant" placeholder="租户">
                </div>
                <div class="form-group">
                    <label for="success"><i class="fas fa-check-circle"></i> 操作结果</label>
                    <select id="success">
                        <option value="">全部</option>
                        <option value="true">成功</option>
                        <option value="false">失败</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="operateObject"><i class="fas fa-bullseye"></i> 操作对象</label>
                    <input type="text" id="operateObject" placeholder="操作对象">
                </div>
                <div class="form-group">
                    <label for="operateDesc"><i class="fas fa-align-left"></i> 操作描述</label>
                    <input type="text" id="operateDesc" placeholder="操作描述">
                </div>
                <div class="form-group">
                    <label for="traceId"><i class="fas fa-link"></i> 链路追踪ID</label>
                    <input type="text" id="traceId" placeholder="traceId">
                </div>
                <div class="form-group time-input">
                    <label for="startTime"><i class="fas fa-clock"></i> 开始时间 <span style="color: red;">*</span></label>
                    <input type="text" id="startTime" placeholder="yyyy-MM-dd HH:mm:ss">
                </div>
                <div class="form-group time-input">
                    <label for="endTime"><i class="fas fa-clock"></i> 结束时间 <span style="color: red;">*</span></label>
                    <input type="text" id="endTime" placeholder="yyyy-MM-dd HH:mm:ss">
                </div>
                <div class="form-group quick-time-group">
                    <label for="quickTime"><i class="fas fa-bolt"></i> 快捷选择</label>
                    <select id="quickTime" onchange="setQuickTime()">
                        <option value="">自定义时间</option>
                        <option value="today">今天</option>
                        <option value="yesterday">昨天</option>
                        <option value="dayBeforeYesterday">前天</option>
                        <option value="15minutes">最近15分钟</option>
                        <option value="30minutes">最近30分钟</option>
                        <option value="1hours">最近1小时</option>
                        <option value="2hours">最近2小时</option>
                        <option value="3hours">最近3小时</option>
                        <option value="4hours">最近4小时</option>
                        <option value="12hours">最近12小时</option>
                        <option value="24hours">最近24小时</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="resetForm()">
                    <i class="fas fa-redo"></i> 重置
                </button>
                <button class="btn btn-primary" onclick="searchLogs()">
                    <i class="fas fa-search"></i> 查询
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div>
                <i class="fas fa-table"></i> 日志列表
            </div>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table id="logTable">
                    <thead>
                    <tr>
                        <th>操作人</th>
                        <th>业务类型</th>
                        <th>业务子类型</th>
                        <th>操作描述</th>
                        <th>操作对象</th>
                        <th>操作时间</th>
                        <th>操作结果</th>
                        <th>traceId</th>
                        <th>租户</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="logTableBody">
                    <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
                <div id="loadingIndicator" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在加载数据...</p>
                </div>
                <div id="noDataMessage" class="no-data" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p>暂无数据</p>
                </div>
            </div>

            <div class="pagination-container">
                <div id="layuiPagination"></div>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>日志详情</h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <table class="detail-table">
                <tr>
                    <th>操作人</th>
                    <td id="detailOperator">-</td>
                </tr>
                <tr>
                    <th>业务类型</th>
                    <td id="detailBizType">-</td>
                </tr>
                <tr>
                    <th>业务子类型</th>
                    <td id="detailSubBizType">-</td>
                </tr>
                <tr>
                    <th>操作描述</th>
                    <td id="detailOperateDesc">-</td>
                </tr>
                <tr>
                    <th>操作对象</th>
                    <td id="detailOperateObject">-</td>
                </tr>
                <tr>
                    <th>操作结果</th>
                    <td id="detailSuccess">-</td>
                </tr>
                <tr>
                    <th>租户</th>
                    <td id="detailTenant">-</td>
                </tr>
                <tr>
                    <th>操作时间</th>
                    <td id="detailOperateTime">-</td>
                </tr>
                <tr>
                    <th>traceId</th>
                    <td id="detailTraceId">-</td>
                </tr>
                <tr>
                    <th>异常信息</th>
                    <td id="detailErrorMsg">-</td>
                </tr>
                <tr>
                    <th>扩展信息</th>
                    <td id="detailExt">-</td>
                </tr>
                <tr>
                    <th>耗时(ms)</th>
                    <td id="detailCostTime">-</td>
                </tr>
            </table>
            <h3>变更详情 (operateDsl)</h3>
            <div id="detailOperateDslContainer">
                <!-- 根据操作类型动态显示内容 -->
            </div>
        </div>
    </div>
</div>

<script>
    // 当前页码
    let currentPage = 1;
    // 每页条数
    let pageSize = 30;
    // 总记录数
    let totalRecords = 0;

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function () {
        // 添加搜索条件折叠功能
        document.getElementById('searchHeader').addEventListener('click', toggleSearchCollapse);

        // 初始化日期时间选择控件
        initDateTimePicker();
    });

    // 切换搜索条件折叠状态
    function toggleSearchCollapse() {
        isSearchCollapsed = !isSearchCollapsed;
        const content = document.getElementById('searchContent');
        const icon = document.getElementById('collapseIcon');

        if (isSearchCollapsed) {
            content.classList.add('collapsed');
            icon.classList.add('rotated');
        } else {
            content.classList.remove('collapsed');
            icon.classList.remove('rotated');
        }
    }

    // 查询日志
    function searchLogs() {
        showLoading(true);
        // 获取时间值并转换为时间戳
        let startTimeValue = document.getElementById('startTime').value;
        let endTimeValue = document.getElementById('endTime').value;

        // 验证操作时间必填
        if (!startTimeValue || !endTimeValue) {
            alert('操作时间（开始时间和结束时间）必须填写');
            showLoading(false);
            return;
        }

        // 验证时间范围不能超过24小时
        if (startTimeValue && endTimeValue) {
            const startTime = new Date(startTimeValue).getTime();
            const endTime = new Date(endTimeValue).getTime();

            // 验证时间格式是否有效
            if (isNaN(startTime) || isNaN(endTime)) {
                alert('时间格式不正确，请使用 yyyy-MM-dd HH:mm:ss 格式');
                showLoading(false);
                return;
            }

            const diffHours = (endTime - startTime) / (1000 * 60 * 60);

            if (diffHours > 24) {
                alert('查询时间范围不能超过24小时');
                showLoading(false);
                return;
            }

            if (startTime > endTime) {
                alert('开始时间不能大于结束时间');
                showLoading(false);
                return;
            }
        }

        const queryModel = {
            pageNum: currentPage,
            pageSize: pageSize,
            bizType: document.getElementById('bizType').value || null,
            subType: document.getElementById('subType').value || null,
            operator: document.getElementById('operator').value || null,
            tenant: document.getElementById('tenant').value || null,
            operateObject: document.getElementById('operateObject').value || null,
            operateDesc: document.getElementById('operateDesc').value || null,
            traceId: document.getElementById('traceId').value || null,
            startTime: startTimeValue ? new Date(startTimeValue).getTime() : null,
            endTime: endTimeValue ? new Date(endTimeValue).getTime() : null
        };

        const successValue = document.getElementById('success').value;
        if (successValue !== '') {
            queryModel.success = successValue === 'true';
        }

        // 发送POST请求查询数据
        fetch('/api/audit/logs/page', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(queryModel)
        })
            .then(response => response.json())
            .then(data => {
                unWrapData = data.data;
                currentLogs = unWrapData.list;
                renderTable(unWrapData.list);
                renderPagination(unWrapData, queryModel);
                showLoading(false);
            })
            .catch(error => {
                console.error('查询出错:', error);
                alert('查询失败，请查看控制台了解详情');
                showLoading(false);
            });
    }

    // 渲染表格数据
    function renderTable(logs) {
        const tbody = document.getElementById('logTableBody');
        const noDataMessage = document.getElementById('noDataMessage');

        if (!logs || logs.length === 0) {
            tbody.innerHTML = '';
            noDataMessage.style.display = 'block';
            return;
        }

        noDataMessage.style.display = 'none';

        tbody.innerHTML = logs.map((log, index) => `
                <tr>
                    <td>${log.operator || '-'}</td>
                    <td>${log.bizType || '-'}</td>
                    <td>${log.subType || '-'}</td>
                    <td>${log.operateDesc || '-'}</td>
                    <td>${log.operateObject || '-'}</td>
                    <td>${formatDate(log.operateTime) || '-'}</td>
                    <td>
                        <span class="status-badge ${log.success ? 'status-success' : 'status-fail'}">
                            ${log.success ? '成功' : '失败'}
                        </span>
                    </td>
                    <td>${log.traceId || '-'}</td>
                     <td>${log.tenant || '-'}</td>
                    <td>
                        <button class="btn btn-info" onclick="showDetail(${log.id})">
                            <i class="fas fa-eye"></i> 查看详情
                        </button>
                    </td>
                </tr>
            `).join('');
    }

    // 显示详情弹窗
    function showDetail(logId) {
        // 显示加载状态
        document.getElementById('detailOperateDslContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加载详情...</p></div>';
        document.getElementById('detailModal').classList.add('open');

        // 请求后端接口获取详情数据
        fetch(`/api/audit/logs/detail?logId=${logId}`)
            .then(response => response.json())
            .then(data => {
                const log = data.data;
                if (!log) {
                    throw new Error('未找到日志详情');
                }

                // 填充基本信息
                document.getElementById('detailOperator').textContent = log.operator || '-';
                document.getElementById('detailBizType').textContent = log.bizType || '-';
                document.getElementById('detailSubBizType').textContent = log.subType || '-';
                document.getElementById('detailOperateDesc').textContent = log.operateDesc || '-';
                document.getElementById('detailOperateObject').textContent = log.operateObject || '-';
                document.getElementById('detailSuccess').innerHTML = `
                    <span class="status-badge ${log.success ? 'status-success' : 'status-fail'}">
                        ${log.success ? '成功' : '失败'}
                    </span>
                `;
                document.getElementById('detailTenant').textContent = log.tenant || '-';
                document.getElementById('detailOperateTime').textContent = formatDate(log.operateTime) || '-';
                document.getElementById('detailTraceId').textContent = log.traceId || '-';
                document.getElementById('detailErrorMsg').textContent = log.errorMsg || '-';
                document.getElementById('detailExt').textContent = log.ext || '-';
                document.getElementById('detailCostTime').textContent = log.costTime || '-';

                const container = document.getElementById('detailOperateDslContainer');
                if(log.operateDsl == null||!log.operateDsl){
                   showJsonViewErrorMsg("-");
                   return;
                }
                const dslData = JSON.parse(log.operateDsl);
                // 当不存在 before 和 after 时，展示格式化的 JSON
                if (!dslData.hasOwnProperty('before') && !dslData.hasOwnProperty('after')) {
                    // 创建用于展示JSON的容器
                    container.innerHTML = '<div id="json-display" style="background-color: #f8fafc; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; max-height: 400px; overflow-y: auto;"></div>';
                    const jsonDisplay = document.getElementById('json-display');
                    // 使用 jquery.json-viewer 展示格式化的 JSON
                    $(jsonDisplay).JSONView(dslData, {
                        collapsed: false,
                        withQuotes: true,
                        withLinks: true
                    });
                } else {
                    const before = dslData.before ? dslData.before : {};
                    const after = dslData.after ? dslData.after : {};
                    // 执行对比
                    const result = jsonDiffTool.compare(before, after);
                    if (result.success) {
                        if (result.diff) {
                            // 渲染差异
                            jsonDiffTool.renderDiff(result.diff, container);
                        } else {
                            alert('没有变更');
                        }
                    } else {
                        alert('对比失败');
                    }
                }
            })
            .catch(error => {
                console.error('获取详情出错:', error);
                showJsonViewErrorMsg("加载失败");
            });
    }

    // 关闭弹窗
    function closeModal() {
        document.getElementById('detailModal').classList.remove('open');
    }
  function showJsonViewErrorMsg(message) {
    document.getElementById('detailOperateDslContainer').innerHTML = '<div class="json-container">'+message+'</div>';
  }

    // 渲染分页控件
    function renderPagination(pageInfo, queryModel) {
        // 根据 AuditLogController.page 方法的返回值结构调整分页信息
        currentPage = queryModel.pageNum || 1;
        totalRecords = pageInfo.total || 0;

        // 使用 layui 分页组件
        layui.use('laypage', function() {
            const laypage = layui.laypage;

            laypage.render({
                elem: 'layuiPagination',
                count: totalRecords,
                limit: pageSize,
                curr: currentPage,
                limits: [30, 50, 100, 200],
                layout: ['count', 'prev', 'page', 'next', 'limit', 'refresh', 'skip'],
                jump: function(obj, first) {
                    if (!first) {
                        // 点击分页时触发
                        currentPage = obj.curr;
                        pageSize = obj.limit;
                        searchLogs();
                    }
                }
            });
        });
    }

    // 更新分页信息
    function updatePaginationInfo(pageInfo) {
        const infoElement = document.getElementById('paginationInfo');
        const total = pageInfo.total || 0;
        infoElement.textContent = `总共 ${total} 条记录`;
    }

            document.getElementById('bizType').value = '';

            document.getElementById('subType').value = '';

            document.getElementById('operator').value = '';

            document.getElementById('tenant').value = '';

            document.getElementById('success').value = '';

            document.getElementById('traceId').value = '';

    // 快捷时间选择（下拉方式）
    function setQuickTime() {
        const quickTimeValue = document.getElementById('quickTime').value;
        
        if (!quickTimeValue) {
            // 选择"自定义时间"时不做处理，允许用户使用日期时间控件手动选择
            return;
        }

        const now = new Date();
        let startTime, endTime;

        // 处理日期快捷选项
        if (quickTimeValue === 'today') {
            // 今天：00:00:00 到 23:59:59
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
            endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
        } else if (quickTimeValue === 'yesterday') {
            // 昨天：昨天00:00:00 到 昨天23:59:59
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 0, 0, 0);
            endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 23, 59, 59);
        } else if (quickTimeValue === 'dayBeforeYesterday') {
            // 前天：前天00:00:00 到 前天23:59:59
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2, 0, 0, 0);
            endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2, 23, 59, 59);
        } else {
            // 处理时间范围快捷选项（最近X分钟/小时）
            const value = parseInt(quickTimeValue);
            const unit = quickTimeValue.replace(value, '');
            endTime = new Date(now.getTime());

            if (unit === 'minutes') {
                startTime = new Date(now.getTime() - value * 60 * 1000);
            } else if (unit === 'hours') {
                startTime = new Date(now.getTime() - value * 60 * 60 * 1000);
            }
        }

        // 格式化为 yyyy-MM-dd HH:mm:ss 格式
        const formatDateTime = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        };

        document.getElementById('startTime').value = formatDateTime(startTime);
        document.getElementById('endTime').value = formatDateTime(endTime);
    }

                trigger: 'click',

                }

            // 结束时间选择器
            laydate.render({

                format: 'yyyy-MM-dd HH:mm:ss',
                trigger: 'click',
                position: 'absolute',
                done: function(value, date) {
                    // 可以在这里添加逻辑
                }
            });
        });
    }
