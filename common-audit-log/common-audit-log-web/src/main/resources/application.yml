spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  profiles:
    active: h2

graceful-response:
  responseStyle: 1
  defaultSuccessCode: 200
  defaultErrorCode: 500

audit:
  log:
    enabled: true
    basePackages: com.taoyuanx.common.log.web
    logScene: high
    appId: default
    enableSharding: false
    shardingTableCount: 2
    enableLogDetailTable: true


db:
  init:
    enabled: true



